name: Build Cross-Platform

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
  pull_request:
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Install UPX
      run: choco install upx -y
      shell: cmd

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
      shell: cmd

    - name: Build Release
      run: |
        cd build
        cmake --build . --config Release --verbose
      shell: cmd

    - name: UPX Compress
      run: |
        upx --best --lzma build\bin\Release\audio_capture.exe
      shell: cmd

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: audio_capture-windows-x64
        path: build/bin/Release/audio_capture.exe

  build-macos:
    runs-on: macos-14
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure CMake
      run: |
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..

    - name: Build Release
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)

    - name: Verify binary
      run: |
        file build/bin/audio_capture
        ls -lh build/bin/audio_capture
        build/bin/audio_capture --help 2>&1 || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: audio_capture-macos-arm64
        path: build/bin/audio_capture
