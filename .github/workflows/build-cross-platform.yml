name: Build Cross-Platform

on:
  push:
    branches: [main, master, dev]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Install UPX
      run: choco install upx -y
      shell: cmd

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
      shell: cmd

    - name: Build Release
      run: |
        cd build
        cmake --build . --config Release --verbose
      shell: cmd

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: audio_capture-windows-x64
        path: build/bin/Release/audio_capture.exe

  build-macos-arm64:
    runs-on: macos-14
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure CMake
      run: |
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64 ..

    - name: Build Release
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)

    - name: Verify binary
      run: |
        file build/bin/audio_capture
        ls -lh build/bin/audio_capture

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: audio_capture-macos-arm64
        path: build/bin/audio_capture

  build-macos-x86_64:
    runs-on: macos-15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure CMake
      run: |
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64 ..

    - name: Build Release
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)

    - name: Verify binary
      run: |
        file build/bin/audio_capture
        ls -lh build/bin/audio_capture

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: audio_capture-macos-x86_64
        path: build/bin/audio_capture

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos-arm64, build-macos-x86_64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Prepare release files
      run: |
        mv audio_capture-windows-x64/audio_capture.exe audio_capture-windows-x64.exe
        mv audio_capture-macos-arm64/audio_capture audio_capture-macos-arm64
        mv audio_capture-macos-x86_64/audio_capture audio_capture-macos-x86_64
        chmod +x audio_capture-macos-arm64 audio_capture-macos-x86_64

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          audio_capture-windows-x64.exe
          audio_capture-macos-arm64
          audio_capture-macos-x86_64
